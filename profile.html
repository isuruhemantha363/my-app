<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expert Profile - HANDY LANKA</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f5b400; 
            --secondary: #eab308; 
            --dark: #111827; 
            --accent: #059669; 
            --bg: #f3f4f6; 
            --white: #ffffff;
            --text-muted: #6b7280;
            --reject: #ef4444;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg); 
            color: var(--dark); 
            padding-bottom: 30px;
        }

        /* --- Loading Animation --- */
        #loading-overlay { 
            position: fixed; 
            inset: 0; 
            background: var(--white); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 2000; 
        }
        .spinner { 
            width: 45px; 
            height: 45px; 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Profile Header --- */
        .profile-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            height: 180px;
            border-radius: 0 0 40px 40px;
            position: relative;
            margin-bottom: 70px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .profile-pic-container {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .profile-pic-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--white);
            object-fit: cover;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            background: #eee;
        }

        .online-dot {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border: 3px solid var(--white);
            border-radius: 50%;
        }

        /* --- Content Area --- */
        .main-content { padding: 0 20px; max-width: 500px; margin: 0 auto; }

        .expert-info { text-align: center; margin-bottom: 25px; }
        .expert-name { font-size: 24px; font-weight: 800; color: var(--dark); }
        .expert-tag { color: var(--secondary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .rating-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #fef3c7;
            color: #92400e;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            margin-top: 10px;
        }

        /* --- Stats Grid --- */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--white);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .stat-card span { display: block; font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .stat-card b { font-size: 14px; color: var(--dark); }

        /* --- Appointments Section --- */
        .section-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .appointment-card {
            background: var(--white);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
            border-left: 6px solid var(--primary);
            transition: 0.3s;
        }

        .status-pill {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .details-box {
            background: #f0fdf4;
            border: 1px dashed var(--accent);
            border-radius: 15px;
            padding: 12px;
            margin-top: 15px;
            font-size: 13px;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-app {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-confirm { background: var(--accent); color: white; }
        .btn-reject { background: #e5e7eb; color: var(--text-muted); }

        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            backdrop-filter: blur(5px);
        }

    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight:600; color:var(--text-muted);">Loading Profile...</p>
</div>

<div id="profile-container" style="display:none;">
    <div class="profile-header">
        <a href="login page1.html" class="back-nav">⬅</a>
        <div class="profile-pic-container">
            <img id="emp-photo" src="" alt="Expert">
            <div class="online-dot"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="expert-info">
            <h1 class="expert-name" id="emp-name">Expert Name</h1>
            <p class="expert-tag" id="emp-sub-service">Specialist</p>
            <div class="rating-badge">⭐ <span id="emp-rating">0.0</span> Rating</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><span>Experience</span><b id="emp-exp">N/A</b></div>
            <div class="stat-card"><span>Hourly Rate</span><b id="emp-rate" style="color:var(--accent);">Rs. 0</b></div>
            <div class="stat-card" style="grid-column: span 2;"><span>Location</span><b id="emp-location">Sri Lanka</b></div>
        </div>

        <div class="section-title">📅 Job Appointments</div>
        <div id="appointments-list">
            </div>
    </div>
</div>

<script>
    // Firebase Configuration (ඔබේ පැරණි කේතයෙන් ලබාගන්නා ලදී)
    const firebaseConfig = {
        apiKey: "AIzaSyBmVI2C4G9S4THlS2Tu3JpVo1LpDAMBpfM",
        authDomain: "handylanka-6f7b3.firebaseapp.com",
        databaseURL: "https://handylanka-6f7b3-default-rtdb.firebaseio.com",
        projectId: "handylanka-6f7b3",
        storageBucket: "handylanka-6f7b3.firebasestorage.app",
        messagingSenderId: "932726552349",
        appId: "1:932726552349:web:e7a51b17fd381b168d93f4"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const loggedInEmail = localStorage.getItem("userEmail");
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyr_I_l7-mrJxZ9FCaVR50oUvSq4UVVa9Q_fmuP2zCkZ1RwGFHduCkukuKDqPT-p8hJ/exec";

    if (loggedInEmail) {
        database.ref('employees').orderByChild('email').equalTo(loggedInEmail).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const key = Object.keys(snapshot.val())[0];
                const data = snapshot.val()[key];
                const expertName = data.name;

                document.getElementById('emp-name').innerText = expertName;
                document.getElementById('emp-sub-service').innerText = data.sub_service || 'Expert Professional';
                document.getElementById('emp-photo').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                document.getElementById('emp-rating').innerText = data.rating || 'New';
                document.getElementById('emp-exp').innerText = data.exp || 'Not Set';
                document.getElementById('emp-rate').innerText = "Rs. " + (data.hourly_rate || '0');
                document.getElementById('emp-location').innerText = data.address || 'Island Wide';

                fetchAppointments(expertName);
                
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('profile-container').style.display = 'block';
            }
        });
    }

    function fetchAppointments(name) {
        const container = document.getElementById('appointments-list');
        database.ref('bookings').orderByChild('Professional_Name').equalTo(name.trim()).on('value', (snapshot) => {
            container.innerHTML = "";
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const booking = childSnapshot.val();
                    const bookingId = childSnapshot.key;
                    const status = (booking.Confirm || "pending").toLowerCase();
                    
                    let borderColor = "#f5b400"; 
                    let statusLabel = "PENDING";
                    let statusColor = "#f5b400";

                    if(status === "confirmed") {
                        borderColor = "#059669";
                        statusLabel = "CONFIRMED";
                        statusColor = "#059669";
                    } else if(status === "rejected") {
                        borderColor = "#6b7280";
                        statusLabel = "REJECTED";
                        statusColor = "#6b7280";
                    }

                    const isConfirmed = status === "confirmed";

                    container.innerHTML += `
                        <div class="appointment-card" style="border-left-color: ${borderColor}">
                            <div style="display:flex; justify-content:space-between; align-items:start;">
                                <h4 style="font-size:16px;">${booking.Customer_Name}</h4>
                                <span class="status-pill" style="background:${statusColor}; color:white;">${statusLabel}</span>
                            </div>
                            <p style="font-size:13px; color:#4b5563; margin-top:5px;"><b>Work:</b> ${booking.Work_Description}</p>
                            <div style="margin-top:10px; font-size:11px; font-weight:700; color:var(--text-muted);">
                                📅 ${booking.Date} &nbsp; ⏰ ${booking.Time}
                            </div>

                            ${isConfirmed ? `
                                <div class="details-box">
                                    <p style="color:var(--accent); font-weight:800; margin-bottom:5px;">📞 Contact Info</p>
                                    <b>Phone:</b> ${booking.Customer_Phone}<br>
                                    <b>Address:</b> ${booking.Customer_Address}
                                </div>
                            ` : (status !== "rejected" ? `
                                <div class="btn-group">
                                    <button class="btn-app btn-confirm" onclick="updateStatus('${bookingId}', 'confirmed')">Confirm</button>
                                    <button class="btn-app btn-reject" onclick="updateStatus('${bookingId}', 'rejected')">Reject</button>
                                </div>
                            ` : '')}
                        </div>`;
                });
            } else {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:#9ca3af; font-size:14px;">No appointments yet.</div>`;
            }
        });
    }

    function updateStatus(id, action) {
        const updates = {};
        if (action === 'confirmed') {
            updates['Confirm'] = 'Confirmed';
            updates['Status'] = 'Active';
        } else {
            const reason = prompt("Reason for rejection:");
            if (reason === null) return;
            updates['Confirm'] = 'Rejected';
            updates['Status'] = 'Rejected';
            updates['Cancellation_Reason'] = reason || "Rejected by Expert";
        }

        database.ref('bookings/' + id).update(updates).then(() => {
            alert(action === 'confirmed' ? "Appointment Confirmed!" : "Appointment Rejected.");
        });
    }
</script>
</body>
</html>
