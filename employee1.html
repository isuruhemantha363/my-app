<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Employee Register - HANDY LANKA</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #d97706;
      --accent: #f5b400;
      --bg-gradient: linear-gradient(-45deg, #fdfc47, #fef3c7, #a7f3d0, #fef3c7);
      --card-bg: rgba(255, 255, 255, 0.9);
      --text-main: #111827;
      --shadow: 0 10px 30px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientAnimation 15s ease infinite;
      color: var(--text-main);
      padding-bottom: 40px;
    }

    @keyframes gradientAnimation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      text-align: center;
      
      padding: 20px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 15px rgba(0,0,0,0.05);
      margin-bottom: 30px;
      display: flex;
      gap: 660px;
    }

    .n_logo { height: 100px; display: block; margin: 0 auto 10px; }
    .logo { font-size:40px; font-weight: 800; color: #000; letter-spacing: 1px; }
    .logo span { color: var(--primary); }

    .register-container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .register-container h2 { text-align: center; margin-bottom: 25px; font-weight: 800; }

    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }

    input, select, textarea {
      width: 100%; padding: 12px 15px; border: 1.5px solid rgba(0,0,0,0.05); border-radius: 12px;
      font-size: 0.95rem; background: #fff; transition: var(--transition);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.1);
    }

    /* Skill Bar Styling */
    .skill-bar { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.03); padding: 12px; border-radius: 12px; }
    .skill-bar input[type=range] { flex: 1; accent-color: var(--primary); cursor: pointer; }
    .skill-value { background: var(--primary); color: #fff; padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 0.8rem; }

    /* Selection options style */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.02); padding: 15px; border-radius: 12px; border: 1px dashed var(--primary); }
    .option-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; }
    .option-item input { width: auto; }

    button {
      width: 100%; padding: 16px; background: var(--primary); color: white; border: none;
      border-radius: 15px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: var(--transition);
      margin-top: 15px; box-shadow: 0 5px 15px rgba(217, 119, 6, 0.3);
    }

    button:hover { background: #b45309; transform: translateY(-3px); }
    button:disabled { background: #9ca3af; cursor: not-allowed; }

    .footer-links { text-align: center; margin-top: 25px; font-size: 0.9rem; font-weight: 600; }
    .footer-links a { color: var(--primary); text-decoration: none; }

    footer { text-align: center; padding: 40px 20px; color: #666; font-weight: 600; font-size: 0.85rem; }
  </style>
</head>
<body>

  <header>
    <div><img src="n logo.png" class="n_logo" alt="Handy Lanka"></div>
    <div><h1 class="logo">HANDY <span>LANKA</span></h1></div>

  </header>

  <div class="register-container">
    <h2>Join Our <span>Pro Team</span></h2>
    <form id="employeeForm">
      
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="Ex: Sunil Perera" required>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10" required>
        </div>
      </div>

      <div class="form-group">
        <label>Residential Address</label>
        <input type="text" id="address" placeholder="Enter your full address" required>
      </div>

      <div class="form-group">
        <label>Main Service Category</label>
        <select id="service" onchange="updateSubServices()" required>
          <option value="">-- Select Category --</option>
          <option value="house_cleaning_painting">House Cleaning & Painting</option>
          <option value="electrical">Electrical Repairs</option>
          <option value="gardening">Gardening</option>
          <option value="plumbing">Plumbing Services</option>
          <option value="handyman">General Handyman</option>
          <option value="moving">Moving Help</option>
        </select>
      </div>

      <div class="form-group" id="subServiceGroup" style="display:none;">
        <label>Service Specialty</label>
        <select id="sub_service">
          <option value="">-- Choose Type --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Customer Service Options (Select Multiple)</label>
        <div class="options-grid">
          <div class="option-item"><input type="checkbox" name="cust_service" value="emergency"> Emergency Service</div>
          <div class="option-item"><input type="checkbox" name="cust_service" value="warranty"> Service Warranty</div>
          <div class="option-item"><input type="checkbox" name="cust_service" value="tools"> Provide Tools</div>
          <div class="option-item"><input type="checkbox" name="cust_service" value="remote"> Remote Consult</div>
        </div>
      </div>

      <div class="form-group">
        <label>Hourly Rate (Rs. per Hour)</label>
        <input type="number" id="hourly_rate" placeholder="Ex: 1500" required>
      </div>

      <div class="form-group">
        <label>Skill Proficiency Level</label>
        <div class="skill-bar">
          <input type="range" id="skill" min="0" max="100" value="50" oninput="document.getElementById('skillValue').textContent=this.value+'%'">
          <span id="skillValue" class="skill-value">50%</span>
        </div>
      </div>

      <div class="form-group">
        <label>Describe Your Experience</label>
        <textarea id="experience" rows="3" placeholder="Tell us about your previous work experience..." required></textarea>
      </div>

      <button type="submit" id="submitBtn">Register Now</button>
    </form>

    <div class="footer-links">
      Already a member? <a href="thank22.html">View </a>
    </div>
  </div>

  <footer>
    &copy; 2026 HANDY LANKA - Registration Portal
  </footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const subServiceData = {
    'house_cleaning_painting': [
        {val: 'deep_cleaning', text: 'Full Deep Cleaning'},
        {val: 'interior_painting', text: 'Interior Wall Painting'},
        {val: 'exterior_painting', text: 'Exterior & Roof Painting'},
        {val: 'floor_polishing', text: 'Floor Waxing & Polishing'}
    ],
    'electrical': [
        {val: 'wiring', text: 'Full House Wiring'},
        {val: 'installation', text: 'Lighting & Fan Install'},
        {val: 'solar', text: 'Solar Panel Setup'},
        {val: 'ac_repair', text: 'AC Unit Maintenance'}
    ],
    'gardening': [
        {val: 'lawn_care', text: 'Lawn Mowing & Care'},
        {val: 'landscaping', text: 'Landscaping & Design'},
        {val: 'tree_cutting', text: 'Tree Pruning/Cutting'},
        {val: 'irrigation', text: 'Garden Sprinkler Setup'}
    ],
    'plumbing': [
        {val: 'leak_repair', text: 'Pipe Leak Repairs'},
        {val: 'fixture_install', text: 'Tap & Bathroom Fittings'},
        {val: 'pump_repair', text: 'Water Pump Maintenance'},
        {val: 'tank_cleaning', text: 'Water Tank Cleaning'}
    ],
    'handyman': [
        {val: 'furniture', text: 'Furniture Assembly'},
        {val: 'masonry', text: 'Small Masonry/Brick Work'},
        {val: 'carpentry', text: 'Woodwork & Carpentry'},
        {val: 'roof_leak', text: 'Roof Leakage Repair'}
    ],
    'moving': [
        {val: 'pack_move', text: 'Full Packing & Moving'},
        {val: 'office_relocation', text: 'Office Relocation'},
        {val: 'heavy_lifting', text: 'Safe/Piano Moving'},
        {val: 'transport', text: 'Vehicle Transport Only'}
    ]
  };

  function updateSubServices() {
    const mainService = document.getElementById('service').value;
    const subSelect = document.getElementById('sub_service');
    const subGroup = document.getElementById('subServiceGroup');

    subSelect.innerHTML = '<option value="">-- Choose Type --</option>';

    if (subServiceData[mainService]) {
      subGroup.style.display = 'block';
      subServiceData[mainService].forEach(item => {
        let opt = document.createElement('option');
        opt.value = item.val;
        opt.textContent = item.text;
        subSelect.appendChild(opt);
      });
      subSelect.required = true;
    } else {
      subGroup.style.display = 'none';
      subSelect.required = false;
    }
  }

  // Firebase Init
  const firebaseConfig = {
    apiKey: "AIzaSyBmVI2C4G9S4THlS2Tu3JpVo1LpDAMBpfM",
    authDomain: "handylanka-6f7b3.firebaseapp.com",
    databaseURL: "https://handylanka-6f7b3-default-rtdb.firebaseio.com",
    projectId: "handylanka-6f7b3",
    storageBucket: "handylanka-6f7b3.firebasestorage.app",
    messagingSenderId: "932726552349",
    appId: "1:932726552349:web:e7a51b17fd381b168d93f4"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  document.getElementById('employeeForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');

    // Get selected customer services
    const selectedCustServices = [];
    document.querySelectorAll('input[name="cust_service"]:checked').forEach(cb => {
        selectedCustServices.push(cb.value);
    });
    
    const formData = {
      name: document.getElementById('fullname').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      service: document.getElementById('service').value,
      sub_service: document.getElementById('sub_service').value || 'general',
      hourly_rate: document.getElementById('hourly_rate').value,
      customer_options: selectedCustServices,
      skill: document.getElementById('skill').value,
      exp: document.getElementById('experience').value,
      timestamp: firebase.database.ServerValue.TIMESTAMP
    };

    btn.innerText = "Registering...";
    btn.disabled = true;

    database.ref('employees').push().set(formData)
      .then(() => {
        alert("Registration Successful!");
        const employeeID = "101"; // මෙය පද්ධතියෙන් ලැබෙන ID එක විය යුතුය
window.location.href = "thank2.html?id=" + employeeID;
      })
      .catch((err) => {
        alert("Error: " + err.message);
        btn.disabled = false;
        btn.innerText = "Register Now";
      });
  });

  
</script>
</body>
</html>
