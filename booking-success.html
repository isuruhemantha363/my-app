<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Booking Success | HANDY LANKA</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #d97706;
      --secondary: #1e293b;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg-light: #f8fafc;
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Poppins', sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-light);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* App Header Like Bar */
    .app-header {
      padding: 20px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      background: transparent;
      position: absolute;
      width: 100%;
      top: 0;
      z-index: 10;
    }

    .lang-btn {
      padding: 6px 16px;
      background: white;
      border: 1.5px solid var(--primary);
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      color: var(--primary);
      font-size: 13px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    /* Main Container */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      margin-top: 40px;
    }

    .status-icon-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    .icon-box {
      width: 90px;
      height: 90px;
      background: var(--success);
      color: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 45px;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      animation: checkPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes checkPop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    h2 { 
      font-weight: 700; 
      color: #1e293b; 
      margin-bottom: 12px; 
      font-size: 22px; 
    }
    
    .msg-box {
      background: #ffffff;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #475569;
      line-height: 1.6;
      border: 1px solid #e2e8f0;
      width: 100%;
      max-width: 350px;
    }

    .msg-box strong { color: var(--success); }

    /* Cancellation Policy Card */
    .cancel-notice {
      background: #fffbeb;
      padding: 18px;
      border-radius: 20px;
      border-left: 4px solid var(--warning);
      margin-bottom: 30px;
      text-align: left;
      width: 100%;
      max-width: 350px;
    }

    .cancel-notice h4 {
      color: #92400e;
      font-size: 15px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cancel-notice p {
      font-size: 12.5px;
      color: #78350f;
      line-height: 1.5;
    }

    /* Bottom Button Sheet */
    .action-sheet {
      background: white;
      padding: 24px;
      border-radius: 30px 30px 0 0;
      box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      transition: opacity 0.2s;
    }

    .btn:active { opacity: 0.7; }

    .btn-home { background: var(--primary); color: white; }
    .btn-cancel { background: #f1f5f9; color: var(--danger); }

    .btn-wa {
      grid-column: span 2;
      background: #25d366;
      color: white;
      margin-top: 4px;
    }

    .footer-links {
      grid-column: span 2;
      margin-top: 15px;
      text-align: center;
    }

    .footer-links a { 
      font-size: 13px; 
      text-decoration: none; 
      color: #94a3b8; 
      font-weight: 500;
      padding: 10px;
      display: inline-block;
    }

  </style>
</head>
<body>

  <div class="app-header">
    <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">සිංහල</button>
  </div>

  <div class="container">
    <div class="status-icon-wrapper">
      <div class="icon-box">✓</div>
    </div>
    
    <h2 id="title">Booking Successful!</h2>
    
    <div class="msg-box" id="msgBox">
      <strong>🔔 Notice:</strong><br>
      We will confirm your booking via Email or SMS within 1 hour.
    </div>

    <div class="cancel-notice">
      <h4 id="cancelTitle">⚠️ Cancellation Policy</h4>
      <p id="cancelDesc">
        If you need to cancel this booking, please do so via the <b>App</b> or by <b>Calling us</b> at least <b>24 hours</b> in advance.
      </p>
    </div>
  </div>

  <div class="action-sheet">
    <button class="btn btn-home" onclick="goHome()" id="homeBtn">🏠 Home</button>
    <button class="btn btn-cancel" onclick="goCancel()" id="cancelBtn">✕ Cancel</button>
    <button class="btn btn-wa" onclick="chatWA()" id="waBtn">💬 WhatsApp Help</button>
    
    <div class="footer-links">
      <a href="#" onclick="logout()" id="logoutText">Logout from website</a>
    </div>
  </div>

  <script>
    let currentLang = 'en';

    const translations = {
      en: {
        title: "Booking Successful!",
        notice: "<strong>🔔 Notice:</strong><br>We will confirm your booking via Email or SMS within 1 hour.",
        cancelTitle: "⚠️ Cancellation Policy",
        cancelDesc: "If you need to cancel this booking, please do so via the <b>App</b> or by <b>Calling us</b> at least <b>24 hours</b> before the scheduled time.",
        homeBtn: "🏠 Home",
        cancelBtn: "✕ Cancel",
        waBtn: "💬 WhatsApp Help",
        logoutText: "Logout from website",
        langBtn: "සිංහල",
        logoutConfirm: "Are you sure you want to logout?"
      },
      si: {
        title: "වෙන්කරවා ගැනීම සාර්ථකයි!",
        notice: "<strong>🔔 දැනුම්දීම:</strong><br>පැයක් ඇතුළත විද්‍යුත් තැපෑල හෝ SMS මගින් ඔබගේ වෙන්කරවා ගැනීම තහවුරු කරන්නෙමු.",
        cancelTitle: "⚠️ අවලංගු කිරීමේ පියවර",
        cancelDesc: "ඔබට මෙම ඇණවුම අවලංගු කිරීමට අවශ්‍ය නම්, කරුණාකර නියමිත වේලාවට අවම වශයෙන් <b>පැය 24කට පෙර</b> අපගේ <b>App එක මගින්</b> හෝ <b>දුරකථන ඇමතුමක්</b> මගින් දැනුම් දෙන්න.",
        homeBtn: "🏠 මුල් පිටුව",
        cancelBtn: "✕ අවලංගු කරන්න",
        waBtn: "💬 වට්ස්ඇප් සහය",
        logoutText: "ගිණුමෙන් ඉවත් වන්න",
        langBtn: "English",
        logoutConfirm: "ඔබට වෙබ් අඩවියෙන් ඉවත් වීමට අවශ්‍ය බව සහතිකද?"
      }
    };

    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'si' : 'en';
      const t = translations[currentLang];
      
      document.getElementById('title').innerText = t.title;
      document.getElementById('msgBox').innerHTML = t.notice;
      document.getElementById('cancelTitle').innerHTML = t.cancelTitle;
      document.getElementById('cancelDesc').innerHTML = t.cancelDesc;
      document.getElementById('homeBtn').innerText = t.homeBtn;
      document.getElementById('cancelBtn').innerText = t.cancelBtn;
      document.getElementById('waBtn').innerText = t.waBtn;
      document.getElementById('logoutText').innerText = t.logoutText;
      document.getElementById('langBtn').innerText = t.langBtn;
    }

    function goHome() {
      window.location.href = "page1.html";
    }

    function goCancel() {
      window.location.href = "cancel-booking.html";
    }

    function logout() {
      if(confirm(translations[currentLang].logoutConfirm)) {
        sessionStorage.clear();
        localStorage.clear();
        window.location.href = "https://www.google.com/"; 
      }
    }

    function chatWA() {
      const msg = currentLang === 'en' ? "Hello Handy Lanka, I need help with my booking." : "ආයුබෝවන් Handy Lanka, මගේ වෙන්කරවා ගැනීම පිළිබඳව සහයක් අවශ්‍යයි.";
      window.open(`https://wa.me/94771234567?text=${encodeURIComponent(msg)}`, '_blank');
    }
  </script>

</body>
</html>
