<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no" />
  <title>Cancellation Success | Handy Lanka</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #f5b400;
      --danger: #ef4444;
      --dark: #1e293b;
      --bg-light: #fef2f2; /* Subtle red-tinted background */
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-light);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* App Header Bar */
    .app-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      position: absolute;
      width: 100%;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--dark);
    }

    .lanka { color: var(--primary); }

    .translate-btn {
      background: white;
      color: var(--dark);
      border: 1.5px solid #e2e8f0;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    /* Main Content Area */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .status-icon-wrapper {
      margin-bottom: 24px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .status-icon {
      width: 90px;
      height: 90px;
      background: #fee2e2;
      color: var(--danger);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(239, 68, 68, 0.15);
    }

    h2 { 
      font-size: 22px; 
      margin-bottom: 12px; 
      font-weight: 700; 
      color: var(--dark);
    }

    p { 
      color: #64748b; 
      margin-bottom: 20px; 
      line-height: 1.6; 
      font-size: 14.5px; 
      max-width: 320px;
    }

    /* Bottom Action Sheet (App style) */
    .action-sheet {
      background: white;
      padding: 30px 24px;
      border-radius: 30px 30px 0 0;
      box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
      width: 100%;
    }

    .btn-home {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      background: var(--dark);
      color: white;
      border-radius: 16px;
      font-weight: 600;
      text-decoration: none;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .btn-home:active {
      transform: scale(0.98);
    }

    footer {
      margin-top: 20px;
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="logo">HANDY <span class="lanka">LANKA</span></div>
    <button class="translate-btn" onclick="toggleLanguage()" id="langBtn">සිංහල (Sinhala)</button>
  </header>

  <div class="container">
    <div class="status-icon-wrapper">
      <div class="status-icon">✕</div>
    </div>
    
    <h2 id="title">Cancellation Successful</h2>
    <p id="msg">Your booking has been successfully cancelled. We are sorry to see you go, but you can always book with us again whenever you need professional help.</p>
  </div>

  <div class="action-sheet">
    <a href="page1.html" class="btn-home" id="homeBtn">
      <span>🏠</span> Return to Home
    </a>
    
    <footer>
      &copy; <span id="year"></span> HANDY LANKA.
    </footer>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    let currentLang = 'en';

    const content = {
      en: {
        title: "Cancellation Successful",
        msg: "Your booking has been successfully cancelled. We are sorry to see you go, but you can always book with us again whenever you need professional help.",
        btn: "Return to Home",
        langBtn: "සිංහල (Sinhala)"
      },
      si: {
        title: "අවලංගු කිරීම සාර්ථකයි",
        msg: "ඔබේ ඇණවුම සාර්ථකව අවලංගු කරන ලදී. ඔබ අපෙන් ඉවත් වීම ගැන අප කනගාටු වෙමු. කෙසේ වෙතත්, ඔබට අවශ්‍ය ඕනෑම වෙලාවක නැවත අපගේ සේවාවන් වෙන්කරවා ගත හැක.",
        btn: "මුල් පිටුවට යන්න",
        langBtn: "English"
      }
    };

    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'si' : 'en';
      
      document.getElementById('title').textContent = content[currentLang].title;
      document.getElementById('msg').textContent = content[currentLang].msg;
      document.getElementById('homeBtn').innerHTML = `<span>🏠</span> ${content[currentLang].btn}`;
      document.getElementById('langBtn').textContent = content[currentLang].langBtn;
      
      document.title = currentLang === 'en' ? "Cancellation Success | Handy Lanka" : "අවලංගු කිරීම සාර්ථකයි | Handy Lanka";
    }
  </script>

</body>
</html>
