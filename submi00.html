<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Handy Lanka | Mobile App Interface</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary: #f5b400;
      --secondary: #eb9f08;
      --dark: #111827;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    body { 
      margin: 0; 
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      color: var(--dark);
      background: var(--bg);
      padding-bottom: 80px; /* Space for bottom nav */
    }

    header { 
      background: white; 
      padding: 12px 15px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 1px 5px rgba(0,0,0,0.05);
    }
    .n_logo { width: 90px; height: auto; }

    .main-container { padding: 15px; display: flex; flex-direction: column; gap: 15px; }

    /* Progress Steps - Mobile Optimized */
    .progress-container { margin: 10px 5px 35px; display: flex; justify-content: space-between; position: relative; }
    .progress-container::before { content: ""; background: #e5e7eb; position: absolute; top: 15px; left: 0; height: 3px; width: 100%; z-index: 1; }
    .step { background: #fff; color: #9ca3af; border-radius: 50%; height: 30px; width: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid #e5e7eb; z-index: 2; font-size: 12px; font-weight: bold; position: relative; }
    .step.active { border-color: var(--primary); color: white; background: var(--primary); }
    .step-label { position: absolute; top: 35px; font-size: 9px; white-space: nowrap; font-weight: 700; color: #6b7280; }

    .card { background: var(--card-bg); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); }

    /* Employee List Styles - List View for Mobile */
    .employee-list { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
    .emp-card { border: 1.5px solid #f1f5f9; border-radius: 16px; padding: 12px; background: #fff; display: flex; align-items: center; gap: 12px; position: relative; }
    .emp-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
    .emp-info { flex: 1; }
    .emp-name { font-weight: 800; font-size: 15px; }
    .emp-sub { font-size: 11px; color: var(--secondary); font-weight: 700; text-transform: uppercase; }
    
    .view-review-link { font-size: 10px; color: #64748b; text-decoration: underline; margin-top: 4px; display: block; }

    /* Form Styles */
    .form-group { margin-bottom: 15px; }
    label { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: block; color: #4b5563; }
    input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; box-sizing: border-box; background: #fff; -webkit-appearance: none; }
    .readonly-field { background: #f8fafc; color: #92400e; font-weight: 600; border-style: dashed; }

    .loc-btn { background: #e0f2fe; color: #0369a1; border: none; padding: 12px; border-radius: 10px; font-size: 11px; font-weight: 700; width: 100%; margin-top: 5px; }
    .submit-btn { width: 100%; background: var(--primary); border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; color: #451a03; margin-top: 10px; }

    /* Profile Detail View */
    .profile-box { background: #fff; border: 2px solid #fef3c7; border-radius: 20px; overflow: hidden; margin-top: 10px; }
    .profile-header { background: #fffbeb; padding: 20px; text-align: center; }
    .profile-body { padding: 15px; font-size: 13px; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }

    /* Payment Option */
    .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pay-card { border: 2px solid #e5e7eb; border-radius: 12px; padding: 12px; text-align: center; font-weight: 700; font-size: 13px; cursor: pointer; }
    input[type="radio"]:checked + .pay-card { border-color: var(--primary); background: #fffbeb; }

    /* Modal - Mobile Full Screenish */
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
    .modal-content { background: #fff; margin: 15% auto; width: 90%; max-height: 70vh; border-radius: 25px; display: flex; flex-direction: column; overflow: hidden; }
    .feedback-list { padding: 15px; overflow-y: auto; flex: 1; }
    .fb-card { background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 13px; }

    /* Bottom Nav Bar */
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
    .nav-item { font-size: 10px; text-align: center; color: #94a3b8; font-weight: 600; text-decoration: none; }
    .nav-active { color: var(--primary); }
  </style>
</head>
<body>

<header>
  <img src="n logo.png" class="n_logo" onclick="window.location.href='page1.html'">
  <div style="font-weight:900; font-size: 12px; color: #334155;">HANDY LANKA</div>
</header>

<div class="main-container">
  
  <div class="card">
    <div class="progress-container">
      <div class="step active" id="step1">1 <span class="step-label">Category</span></div>
      <div class="step" id="step2">2 <span class="step-label">Expert</span></div>
      <div class="step" id="step3">3 <span class="step-label">Details</span></div>
      <div class="step" id="step4">4 <span class="step-label">Book</span></div>
    </div>
  </div>

  <div class="card">
    <h3 id="list-title" style="margin:0; font-size: 16px;">Verified Professionals</h3>
    <div class="employee-list" id="employee-container">
      <p style="text-align: center; color: #9ca3af; font-size: 13px; padding: 20px;">Please select a category first.</p>
    </div>

    <div id="selected-profile-display" style="display:none;">
      <button type="button" onclick="resetSelection()" style="background:none; border:none; color:var(--secondary); font-weight:800; font-size: 13px; padding-bottom: 10px; display: block;">← Change Professional</button>
      <div id="active-worker-info"></div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0; font-size: 18px;">Booking Details</h3>
    <form id="mainBookingForm">
      <input type="hidden" name="Submission_Time" id="submission_timestamp">
      <input type="hidden" name="Employee_ID" id="hide_emp_id">
      <input type="hidden" name="Customer_Coordinates" id="customer_coords">
      <input type="hidden" name="Employee_Email" id="hide_emp_email">
      <input type="hidden" name="Status" value="Active">
      <input type="hidden" name="emp_phone" id="hide_emp_phone">

      <div class="form-group">
        <label>Service Category</label>
        <select name="Main_Category" id="main_category_select" onchange="updateStep(1); autoFillServiceType(); filterEmployees();" required>
          <option value="">-- Choose Category --</option>
          <option value="house_cleaning_painting">House Cleaning & Painting</option>
          <option value="electrical_repairs">Electrical Repairs</option>
          <option value="gardening_services">Gardening</option>
          <option value="plumbing_services">Plumbing</option>
          <option value="handyman_services">Handyman</option>
          <option value="moving_assistance">Moving Service</option>
        </select>
      </div>

      <div class="form-group">
        <label>Service Type</label>
        <input type="text" name="Service_Type" id="service_type_input" class="readonly-field" readonly required>
      </div>

      <div class="form-group">
        <label>Assigned Expert</label>
        <input type="text" name="Professional_Name" id="form_worker_name" class="readonly-field" placeholder="Select an expert from list" readonly required>
      </div>

      <div class="form-group">
        <label>Your Full Name</label>
        <input type="text" name="Customer_Name" oninput="updateStep(3)" placeholder="Enter name" required>
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" name="Customer_Phone" placeholder="07xxxxxxxx" maxlength="10" required>
      </div>

      <div class="form-group">
        <label>Service Address</label>
        <input type="text" name="Customer_Address" id="customer_address" placeholder="Address" required>
        <button type="button" class="loc-btn" onclick="getLocation()">📍 Use Current Location</button>
      </div>

      <div class="form-group">
        <label>Notification Email</label>
        <input type="email" name="Customer_Email" placeholder="email@example.com" required>
      </div>

      <div class="form-group">
        <label>Work Description</label>
        <textarea name="Work_Description" rows="3" placeholder="Explain the job..." required></textarea>
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <div style="flex:1;"><label>Date</label><input type="date" name="Date" required></div>
        <div style="flex:1;"><label>Time</label><input type="time" name="Time" required></div>
      </div>

      <div class="form-group">
        <label>Payment Method</label>
        <div class="payment-grid">
          <label style="flex:1;">
            <input type="radio" name="Payment_Method" value="Cash" checked style="display:none">
            <div class="pay-card">💵 Cash</div>
          </label>
          <label style="flex:1;">
            <input type="radio" name="Payment_Method" value="Card" style="display:none">
            <div class="pay-card">💳 Card</div>
          </label>
        </div>
      </div>

      <button type="submit" class="submit-btn">Book Appointment</button>
    </form>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item nav-active" onclick="window.location.href='home.html'" style="border: none; background-color: white;">
    🏠<br>Home
  </button>
  
  <button class="nav-item" onclick="window.location.href='page1.html'"style="border: none; background-color: white;">
    🛠️<br>Services
  </button>
  
  <button class="nav-item" onclick="window.location.href='submi00.html'"style="border: none; background-color: white;">
    📅<br>Bookings
  </button>
  
  <button class="nav-item" onclick="window.location.href='help.html'"style="border: none; background-color: white;">
    ❓<br>Help
  </button>
</nav>

<div id="feedbackModal" class="modal">
  <div class="modal-content">
    <div style="padding: 15px; border-bottom: 1px solid #eee; font-weight: 800; text-align: center;" id="modalWorkerName">Reviews</div>
    <div class="feedback-list" id="feedbackContainer"></div>
    <button onclick="closeFeedback()" style="margin: 15px; padding: 12px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: bold;">Close</button>
  </div>
</div>

<script>
  // Firebase Config (Original)
  const firebaseConfig = {
    apiKey: "AIzaSyBmVI2C4G9S4THlS2Tu3JpVo1LpDAMBpfM",
    authDomain: "handylanka-6f7b3.firebaseapp.com",
    databaseURL: "https://handylanka-6f7b3-default-rtdb.firebaseio.com",
    projectId: "handylanka-6f7b3",
    storageBucket: "handylanka-6f7b3.firebasestorage.app",
    messagingSenderId: "932726552349",
    appId: "1:932726552349:web:e7a51b17fd381b168d93f4"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  let allEmployees = [];

  // Core Logic (Original - All functions preserved)
  function getLocation() {
    const addrInput = document.getElementById('customer_address');
    const coordInput = document.getElementById('customer_coords');
    if (navigator.geolocation) {
      addrInput.placeholder = "Locating...";
      navigator.geolocation.getCurrentPosition((position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          coordInput.value = `Lat: ${lat}, Lon: ${lon}`;
          addrInput.value = `📍 Current Location (${lat.toFixed(4)}, ${lon.toFixed(4)})`;
        }, () => { alert("Enable GPS"); }
      );
    }
  }

  function updateStep(step) {
    for(let i=1; i<=4; i++) {
      const el = document.getElementById('step'+i);
      if(el) i <= step ? el.classList.add('active') : el.classList.remove('active');
    }
  }

  function autoFillServiceType() {
    const category = document.getElementById('main_category_select').value;
    const typeInput = document.getElementById('service_type_input');
    const serviceMap = {
      'house_cleaning_painting': 'Cleaning & Painting Care',
      'electrical_repairs': 'Technical Support',
      'gardening_services': 'Outdoor Maintenance',
      'plumbing_services': 'Hydraulic Works',
      'handyman_services': 'General Repairs',
      'moving_assistance': 'Logistics & Moving'
    };
    typeInput.value = serviceMap[category] || "";
  }

  function fetchInitialData() {
    database.ref('employees').on('value', (snapshot) => {
      const data = snapshot.val();
      allEmployees = [];
      for (let id in data) { allEmployees.push({id, ...data[id]}); }
      filterEmployees();
    });
  }

  function filterEmployees() {
    const selectedVal = document.getElementById('main_category_select').value;
    const container = document.getElementById('employee-container');
    resetSelection();
    if (!selectedVal) return;

    const filtered = allEmployees.filter(emp => {
      const dbService = (emp.service || "").toLowerCase().replace(/_/g, '');
      const searchVal = selectedVal.toLowerCase().replace(/_/g, '').replace('services', '').replace('repairs', '').replace('assistance', '');
      return dbService.includes(searchVal);
    });

    container.innerHTML = filtered.length ? '' : '<p style="text-align: center; font-size: 13px;">No experts found.</p>';
    filtered.forEach(emp => {
      container.innerHTML += `
        <div class="emp-card" onclick="selectWorker('${emp.id}')">
          <img src="${emp.photo === 'no-image' ? 'https://cdn-icons-png.flaticon.com/512/149/149071.png' : emp.photo}">
          <div class="emp-info">
            <div class="emp-name">${emp.name}</div>
            <div class="emp-sub">${emp.sub_service || 'Expert'}</div>
            <div style="font-size: 11px; color: #64748b; margin-top:2px;">Rs. ${emp.hourly_rate || 'N/A'} /hr</div>
            <span class="view-review-link" onclick="event.stopPropagation(); showFeedbacks('${emp.name}')">View Reviews</span>
          </div>
          <div style="color: var(--primary); font-size: 20px;">➔</div>
        </div>`;
    });
  }

  function selectWorker(id) {
    const worker = allEmployees.find(e => e.id === id);
    document.getElementById('employee-container').style.display = 'none';
    document.getElementById('list-title').style.display = 'none';
    document.getElementById('selected-profile-display').style.display = 'block';
    
    document.getElementById('active-worker-info').innerHTML = `
      <div class="profile-box">
        <div class="profile-header">
           <img src="${worker.photo === 'no-image' ? 'https://cdn-icons-png.flaticon.com/512/149/149071.png' : worker.photo}" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--primary); object-fit: cover;">
           <h4 style="margin:10px 0 0;">${worker.name}</h4>
           <div style="font-size: 11px; color: #b45309; font-weight: 700;">${worker.sub_service || 'Professional'}</div>
        </div>
        <div class="profile-body">
           <div class="detail-row"><span>📍 Address</span> <b>${worker.address || 'N/A'}</b></div>
           <div class="detail-row"><span>🏆 Experience</span> <b>${worker.exp || 'N/A'}</b></div>
           <div class="detail-row"><span>💰 Rate</span> <b>Rs. ${worker.hourly_rate}</b></div>
           <div class="detail-row"><span>⚡ Skill Score</span> <b>${worker.skill || 'Verified'}</b></div>
        </div>
      </div>`;
      
    document.getElementById('form_worker_name').value = worker.name;
    document.getElementById('hide_emp_id').value = id;
    document.getElementById('hide_emp_email').value = worker.email || "";
    document.getElementById('hide_emp_phone').value = worker.phone || "";
    updateStep(2);
  }

  function resetSelection() {
    document.getElementById('employee-container').style.display = 'flex';
    document.getElementById('list-title').style.display = 'block';
    document.getElementById('selected-profile-display').style.display = 'none';
    document.getElementById('form_worker_name').value = "";
  }

  document.getElementById('mainBookingForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const submitBtn = this.querySelector('.submit-btn');
    const now = new Date();
    document.getElementById('submission_timestamp').value = now.toLocaleString();
    
    const formData = new FormData(this);
    const bookingData = {};
    formData.forEach((value, key) => { bookingData[key] = value; });

    submitBtn.innerText = "Please wait...";
    submitBtn.disabled = true;

    database.ref('bookings').push().set(bookingData).then(() => {
        const scriptURL = "https://script.google.com/macros/s/AKfycbznZ7EikzMwLoc9uvzgZq8orbnoN9IcVDxlLi2ZpBFshHX4vKpX737eQtuuX91Rv8ymkw/exec";
        const params = new URLSearchParams();
        formData.forEach((value, key) => params.append(key, value));
        return fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: params });
      })
      .then(() => { window.location.href = "booking-success.html"; })
      .catch(err => { alert("Error!"); submitBtn.disabled = false; });
  });

  function showFeedbacks(employeeName) {
    document.getElementById('modalWorkerName').innerText = employeeName + " - Reviews";
    const container = document.getElementById('feedbackContainer');
    container.innerHTML = "Loading...";
    document.getElementById('feedbackModal').style.display = 'block';
    database.ref('feedbacks').orderByChild('employee').equalTo(employeeName).once('value', (snapshot) => {
      if (snapshot.exists()) {
        let html = "";
        snapshot.forEach(child => {
          const fb = child.val();
          html += `<div class="fb-card"><b>${fb.customer}</b><div style="color:var(--primary)">${"★".repeat(parseInt(fb.rating || 5))}</div><i>"${fb.comments}"</i></div>`;
        });
        container.innerHTML = html;
      } else { container.innerHTML = "No reviews."; }
    });
  }

  function closeFeedback() { document.getElementById('feedbackModal').style.display = 'none'; }
  
  window.onload = function() {
    fetchInitialData();
    const urlParams = new URLSearchParams(window.location.search);
    const service = urlParams.get('service');
    if (service) {
      document.getElementById('main_category_select').value = service;
      autoFillServiceType();
      filterEmployees();
      updateStep(1);
    }
  };
</script>
</body>
</html>
