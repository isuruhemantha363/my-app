<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | HANDY LANKA</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    /* මුලික සැකසුම් */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-image: url('picture.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 8%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 100;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 680px;
    }

    .n_logo {
      width: 150px;
      height: auto;
      margin-left: -800px;
    }

    .logo {
      font-size: 2.2em;
      color: #000;
      font-weight: 800;
    }

    .logo .lanka {
      color: #d97706;
    }

    header p {
      font-size: 1rem;
      color: #333;
      font-weight: 500;
      margin-top: 5px;
    }

    /* Register Container එක Glassmorphism ආකාරයට */
    .register-container {
      width: 100%;
      max-width: 480px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(25px);
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }

    .register-container h2 {
      text-align: center;
      color: #000;
      font-size: 2em;
      font-weight: 800;
      margin-bottom: 25px;
    }

    .form-group {
      position: relative;
      margin-bottom: 20px;
      border-bottom: 2px solid #000;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      color: #000;
      font-size: 0.9em;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 5px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1em;
      color: #000;
      font-weight: 600;
    }

    .form-group input::placeholder {
      color: rgba(0,0,0,0.5);
      font-weight: 400;
    }

    /* බොත්තම් සැකසුම් */
    .A {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 30px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    button:hover {
      background: #d97706;
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(217, 119, 6, 0.3);
    }

    button:last-child {
      background: transparent;
      border: 2px solid #000;
      color: #000;
    }

    button:last-child:hover {
      background: #000;
      color: #fff;
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      font-size: 0.95rem;
      color: #000;
      font-weight: 500;
    }

    .login-link a {
      color: #d97706;
      font-weight: 700;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .register-container {
        width: 90%;
        padding: 25px;
      }
      .main { flex-direction: column; gap: 5px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="main">
      <img src="n logo.png" class="n_logo" alt="Logo">
      <h2 class="logo">HANDY <span class="lanka">LANKA</span></h2>
    </div>
    <p>Reliable solutions for your household needs</p>
  </header>

  <div class="register-container">
    <h2>Create Account</h2>
    <form id="regForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter a password" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter your password" required>
      </div>

      <div class="A">
        <button type="button" onclick="handleAuth('customer')">Register as a Customer</button>
        <button type="button" onclick="handleAuth('employee')">Register as an Employee</button>
      </div>
    </form>
    
    <div class="login-link">
      Already have an account? <a href="login page1.html">Login here</a>
    </div>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDDXkRpZm2JA_Dz4U8iemCoFNtu9_3ebqI",
      authDomain: "handylanka.firebaseapp.com",
      projectId: "handylanka",
      storageBucket: "handylanka.firebasestorage.app",
      messagingSenderId: "140530899242",
      appId: "1:140530899242:web:a7932ec11176535ed82653",
      measurementId: "G-9FHZXXPBZD"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function handleAuth(role) {
      const fullname = document.getElementById("fullname").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (!fullname || !email || !password) {
        alert("Please fill all fields.");
        return;
      }

      if (password !== confirmPassword) {
        alert("Passwords do not match.");
        return;
      }

      const btn = event.target;
      const originalText = btn.innerHTML;

      try {
        btn.innerHTML = "Processing...";
        btn.disabled = true;

        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await db.collection("users").doc(user.uid).set({
          fullname: fullname,
          email: email,
          role: role,
          createdAt: new Date()
        });

        alert("Registration Successful!");

        if (role === 'customer') {
          window.location.href = "page1.html";
        } else {
          window.location.href = "employee1.html";
        }

      } catch (error) {
        alert(error.message);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
