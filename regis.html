<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no" />
  <title>Register | HANDY LANKA</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #d97706;
      --secondary: #111827;
      --accent: #fbbf24;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.9);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('picture.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
    }

    /* --- MOBILE APP HEADER --- */
    header {
      width: 100%;
      max-width: 450px;
      padding: 30px 0;
      text-align: center;
      color: var(--white);
      animation: fadeInDown 0.8s ease;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .n_logo {
      width: 70px;
      margin-bottom: 10px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .logo span { color: var(--accent); }

    /* --- REGISTER CARD --- */
    .register-container {
      width: 100%;
      max-width: 450px;
      background: var(--glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 35px 25px;
      border-radius: 35px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .register-container h2 {
      text-align: center;
      color: var(--secondary);
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 25px;
    }

    /* --- FORM STYLING --- */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #4b5563;
      font-size: 0.75rem;
      margin-left: 5px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      background: rgba(0,0,0,0.05);
      border-radius: 15px;
      padding: 12px 18px;
      border: 1px solid rgba(0,0,0,0.05);
      transition: 0.3s;
    }

    .input-wrapper:focus-within {
      background: white;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.1);
    }

    .form-group input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 0.95rem;
      color: var(--secondary);
      font-weight: 500;
    }

    /* --- MOBILE APP BUTTONS --- */
    .btn-group {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      width: 100%;
      height: 55px;
      border-radius: 18px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: 0.3s;
      border: none;
    }

    .btn-cust {
      background: linear-gradient(45deg, var(--secondary), #374151);
      color: var(--white);
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .btn-emp {
      background: var(--white);
      border: 2px solid var(--secondary);
      color: var(--secondary);
    }

    button:active {
      transform: scale(0.96);
    }

    .btn-cust:hover { background: var(--primary); color: white; border: none; }

    .login-link {
      text-align: center;
      margin-top: 25px;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .login-link a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      margin-left: 5px;
    }

    /* Custom Alert/Loading style */
    .processing {
      pointer-events: none;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <header>
    <img src="n logo.png" class="n_logo" alt="Handy Lanka">
    <h1 class="logo">HANDY <span>LANKA</span></h1>
    <p style="font-size: 0.8rem; opacity: 0.9; margin-top: 5px;">Your Home Service Partner</p>
  </header>

  <div class="register-container">
    <h2>Create Account</h2>
    <form id="regForm">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="fullname" placeholder="Enter your name" required>
        </div>
      </div>
      
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="mail@example.com" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Min. 6 characters" required>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirm-password" placeholder="Re-enter password" required>
        </div>
      </div>

      <div class="btn-group">
        <button type="button" class="btn-cust" id="custBtn" onclick="handleAuth('customer')">Register as Customer</button>
        <button type="button" class="btn-emp" id="empBtn" onclick="handleAuth('employee')">Register as Employee</button>
      </div>
    </form>
    
    <div class="login-link">
      Already have an account? <a href="login page1.html">Login here</a>
    </div>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDDXkRpZm2JA_Dz4U8iemCoFNtu9_3ebqI",
      authDomain: "handylanka.firebaseapp.com",
      projectId: "handylanka",
      storageBucket: "handylanka.firebasestorage.app",
      messagingSenderId: "140530899242",
      appId: "1:140530899242:web:a7932ec11176535ed82653",
      measurementId: "G-9FHZXXPBZD"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function handleAuth(role) {
      const fullname = document.getElementById("fullname").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (!fullname || !email || !password) {
        alert("කරුණාකර සියලු විස්තර පුරවන්න.");
        return;
      }

      if (password.length < 6) {
        alert("මුරපදය අවම වශයෙන් අකුරු 6ක් විය යුතුය.");
        return;
      }

      if (password !== confirmPassword) {
        alert("මුරපද එකිනෙකට නොගැලපේ.");
        return;
      }

      // UI feedback
      const btn = (role === 'customer') ? document.getElementById('custBtn') : document.getElementById('empBtn');
      const originalText = btn.innerHTML;
      
      try {
        btn.innerHTML = "Processing...";
        btn.classList.add('processing');

        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Firestore save
        await db.collection("users").doc(user.uid).set({
          fullname: fullname,
          email: email,
          role: role,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert("ලියාපදිංචිය සාර්ථකයි!");
        window.location.href = (role === 'customer') ? "page1.html" : "employee1.html";

      } catch (error) {
        console.error(error);
        alert("Error: " + error.message);
      } finally {
        btn.innerHTML = originalText;
        btn.classList.remove('processing');
      }
    }
  </script>
</body>
</html>
