<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | HANDY LANKA</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('picture.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- HEADER ---------- */
    header {
      padding: 15px 5%;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .n_logo {
      width: 50px; /* ලාංඡනයට ගැලපෙන ප්‍රමාණය */
      height: auto;
    }

    .logo {
      font-size: 1.8em;
      color: #1f2937;
      font-weight: 800;
    }

    .logo span {
      color: #d97706;
    }

    header p {
      font-size: 0.9rem;
      color: #4b5563;
      margin-top: 5px;
    }

    /* ---------- REGISTER CONTAINER ---------- */
    .register-container {
      width: 90%;
      max-width: 450px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      padding: 35px;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .register-container h2 {
      text-align: center;
      color: #111827;
      font-size: 1.8em;
      font-weight: 800;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #374151;
      font-size: 0.85em;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      border-bottom: 2px solid #e5e7eb;
      transition: 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: #d97706;
    }

    .form-group input {
      width: 100%;
      padding: 10px 0;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1em;
      color: #111827;
    }

    /* ---------- BUTTONS ---------- */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 30px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95rem;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: none;
    }

    .btn-cust {
      background: #111827;
      color: #fff;
    }

    .btn-emp {
      background: transparent;
      border: 2px solid #111827;
      color: #111827;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .btn-cust:hover { background: #d97706; }
    .btn-emp:hover { background: #111827; color: #fff; }

    .login-link {
      text-align: center;
      margin-top: 25px;
      font-size: 0.9rem;
      color: #4b5563;
    }

    .login-link a {
      color: #d97706;
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .register-container { padding: 25px; }
      .logo { font-size: 1.5em; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <img src="n logo.png" class="n_logo" alt="Handy Lanka">
      <h2 class="logo">HANDY <span>LANKA</span></h2>
    </div>
    <p>Reliable solutions for your household needs</p>
  </header>

  <div class="register-container">
    <h2>Create Account</h2>
    <form id="regForm">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="fullname" placeholder="John Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Min. 6 characters" required>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirm-password" placeholder="Re-enter password" required>
        </div>
      </div>

      <div class="btn-group">
        <button type="button" class="btn-cust" onclick="handleAuth('customer')">Register as a Customer</button>
        <button type="button" class="btn-emp" onclick="handleAuth('employee')">Register as an Employee</button>
      </div>
    </form>
    
    <div class="login-link">
      Already have an account? <a href="login page1.html">Login here</a>
    </div>
  </div>

  <script>
    // Firebase Configuration (ඔයාගේ අගයන් එලෙසම තබා ගන්න)
    const firebaseConfig = {
      apiKey: "AIzaSyDDXkRpZm2JA_Dz4U8iemCoFNtu9_3ebqI",
      authDomain: "handylanka.firebaseapp.com",
      projectId: "handylanka",
      storageBucket: "handylanka.firebasestorage.app",
      messagingSenderId: "140530899242",
      appId: "1:140530899242:web:a7932ec11176535ed82653",
      measurementId: "G-9FHZXXPBZD"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function handleAuth(role) {
      const fullname = document.getElementById("fullname").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (!fullname || !email || !password) {
        alert("කරුණාකර සියලු විස්තර පුරවන්න.");
        return;
      }

      if (password.length < 6) {
        alert("මුරපදය අවම වශයෙන් අකුරු 6ක් විය යුතුය.");
        return;
      }

      if (password !== confirmPassword) {
        alert("මුරපද එකිනෙකට නොගැලපේ.");
        return;
      }

      const btn = event.target;
      const originalText = btn.innerHTML;

      try {
        btn.innerHTML = "Processing...";
        btn.disabled = true;

        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Firestore එකේ user data save කිරීම
        await db.collection("users").doc(user.uid).set({
          fullname: fullname,
          email: email,
          role: role,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert("ලියාපදිංචිය සාර්ථකයි!");

        // Role එක අනුව අදාළ පිටුවට යොමු කිරීම
        window.location.href = (role === 'customer') ? "page1.html" : "employee1.html";

      } catch (error) {
        console.error(error);
        alert(error.message);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
