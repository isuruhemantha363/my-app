<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Welcome - HANDY LANKA</title>
  <style>
    :root {
      --bg: #f8f9fa; /* App එකකට ගැළපෙන පිරිසිදු පසුබිමක් */
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent-gold: #f5b400;
      --accent-dark: #111827;
      --shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; /* Mobile ස්පර්ශ කිරීමේදී එන නිල් පාට ඉවත් කිරීමට */
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center; /* මැදට පෙළගැස්වීම */
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Logo එක App එකක මෙන් ඉහළින් */
    .app-header {
      position: absolute;
      top: 40px;
      text-align: center;
      width: 100%;
    }

    .n_logo {
      width: 140px;
      height: auto;
    }

    /* App Card Layout */
    .welcome-card {
      width: 100%;
      max-width: 400px; /* Mobile width එකට සීමා කිරීම */
      background: var(--card);
      padding: 40px 30px;
      border-radius: 30px; /* App වල මෙන් රවුම් දාර */
      box-shadow: var(--shadow);
      text-align: center;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-card h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .lanka-text {
      color: var(--accent-gold);
      display: block; /* Handy Lanka කොටස වෙනම පේළියකට ගැනීමට */
    }

    .welcome-card p {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 35px;
      padding: 0 10px;
    }

    /* Mobile එකට ගැළපෙන Stacked Buttons */
    .btn-group {
      display: flex;
      flex-direction: column; /* බොත්තම් එක පිට එක සිටින ලෙස */
      gap: 15px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      transition: transform 0.2s;
      display: block;
      text-align: center;
    }

    .btn:active {
      transform: scale(0.98); /* බොත්තම එබූ විට සිදුවන වෙනස */
    }

    .btn-primary {
      background: var(--accent-dark);
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .btn-secondary {
      background: #f3f4f6; /* Logout බොත්තම සරල කිරීම */
      color: #ef4444; /* රතු පැහැය ඉවත් වීමට */
      border: 1px solid #e5e7eb;
    }

    .footer-text {
      margin-top: 30px;
      font-size: 0.8rem;
      color: var(--muted);
    }

  </style>
</head>
<body>

  <div class="app-header">
    <img src="n logo.png" class="n_logo" alt="HANDY LANKA">
  </div>

  <div class="welcome-card">
    <h2>Welcome to <span class="lanka-text">HANDY LANKA</span></h2>
    <p>Registration Successful! <br> Explore our services and find the best experts for your home.</p>
    
    <div class="btn-group">
      <a href="page1.html" class="btn btn-primary">Go to Dashboard</a>
      <a href="https://www.google.com" class="btn btn-secondary">Sign Out</a>
    </div>

    <div class="footer-text">
      &copy; <span id="year"></span> HANDY LANKA
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
