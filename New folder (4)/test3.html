<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book a Service - HANDY LANKA</title>
  <style>
    :root {
      --bg: #fff8dc;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #d97706;
      --shadow: rgba(0,0,0,0.1);
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      background: var(--accent);
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .form-container {
      max-width: 600px;
      margin: 40px auto;
      background: var(--card);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 16px var(--shadow);
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(217,119,6,0.25);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #b45309;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>HANDY LANKA</h1>
  </header>

  <div class="form-container">
    <h2>Book a Service</h2>
    <form onsubmit="return submitBooking()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
      </div>

      <div class="form-group">
        <label for="service">Select Service</label>
        <select id="service" name="service" required>
          <option value="">-- Choose a Service --</option>
          <option value="plumbing">Plumbing</option>
          <option value="electrical">Electrical</option>
          <option value="cleaning">Cleaning</option>
          <option value="carpentry">Carpentry</option>
          <option value="gardening">Gardening</option>
          <option value="transport">Moving & Transport</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Additional Details</label>
        <textarea id="message" name="message" rows="4" placeholder="Describe your request"></textarea>
      </div>

      <button type="submit">Submit Booking</button>
    </form>
  </div>

  <footer>
    © <span id="year"></span> HANDY LANKA. All rights reserved.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function submitBooking() {
      alert("Your booking request has been submitted successfully! We will contact you soon.");
      return false; // Prevents actual form submission for demo purposes
    }
  </script>
</body>
</html>
