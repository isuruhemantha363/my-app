<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Database - HANDY LANKA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d97706;
            --accent: #f5b400;
            --bg-gradient: linear-gradient(-45deg, #fdfc47, #fef3c7, #a7f3d0, #fef3c7);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #111827;
            --shadow: 0 10px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: var(--text-main);
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 10px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .n_logo { height: 100px; width: auto; }

        .add-btn {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .add-btn:hover { background: #b45309; transform: scale(1.05); }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 { text-align: center; font-size: 2.5rem; margin-bottom: 20px; font-weight: 800; }
        h2 span { color: var(--primary); }

        .search-container {
            max-width: 600px;
            margin: 0 auto 30px;
            display: flex;
            gap: 10px;
        }

        .search-container input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.5);
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            box-shadow: var(--shadow);
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 22px;
            border: none;
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary);
            color: #fff;
        }

        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .emp-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 28px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.4);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .emp-card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.95); }

        .category-tag {
            background: var(--accent);
            color: #000;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: inline-block;
            align-self: flex-start;
        }

        .hourly-badge {
            float: right;
            background: #10b981;
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .emp-card h3 { font-size: 1.3rem; margin-bottom: 8px; clear: both; }
        .emp-card p { font-size: 0.85rem; color: #4b5563; margin-bottom: 5px; }

        .info-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }

        .full-service-type {
            font-size: 0.82rem;
            color: #b45309;
            font-weight: 700;
            margin: 5px 0 10px 0;
            display: block;
            line-height: 1.4;
            background: rgba(245, 180, 0, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
        }

        .cust-options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .opt-tag {
            background: #e5e7eb;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: 600;
        }

        .experience-box {
            background: rgba(0,0,0,0.03);
            padding: 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin: 10px 0;
            border-left: 4px solid var(--primary);
        }

        .skill-container { margin-top: auto; }
        .skill-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }

        .skill-level-bg {
            background: rgba(0,0,0,0.1);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
        }

        .skill-level-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent), var(--primary));
            transition: width 1s ease-in-out;
        }

        /* Delete Button Style */
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: var(--transition);
            width: fit-content;
            align-self: flex-end;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .delete-btn:hover { background: #dc2626; transform: scale(1.05); }

        .no-data { text-align: center; grid-column: 1 / -1; padding: 50px; font-weight: 600; color: var(--primary); }

        footer { text-align: center; padding: 40px; color: #666; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="n logo.png" class="n_logo" alt="Logo" onclick="window.location.href='owner.html'">
    </div>
    <button class="add-btn" onclick="window.location.href='employee1.html'">+ Add New Professional</button>
</header>

<div class="container">
    <h2>Employee <span>Database</span></h2>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search by name, specialty or address..." onkeyup="searchEmployees()">
    </div>

    <div class="filter-tabs">
        <button class="tab-btn active" onclick="filterData('all', this)">All</button>
        <button class="tab-btn" onclick="filterData('house_cleaning_painting', this)">Cleaning & Painting</button>
        <button class="tab-btn" onclick="filterData('electrical', this)">Electrical</button>
        <button class="tab-btn" onclick="filterData('plumbing', this)">Plumbing</button>
        <button class="tab-btn" onclick="filterData('gardening', this)">Gardening</button>
        <button class="tab-btn" onclick="filterData('handyman', this)">Handyman</button>
        <button class="tab-btn" onclick="filterData('moving', this)">Moving Help</button>
    </div>

    <div class="employee-grid" id="employeeGrid">
        <div class="no-data">Connecting to Database...</div>
    </div>
</div>

<footer>&copy; 2026 HANDY LANKA - Management Panel</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBmVI2C4G9S4THlS2Tu3JpVo1LpDAMBpfM",
        authDomain: "handylanka-6f7b3.firebaseapp.com",
        databaseURL: "https://handylanka-6f7b3-default-rtdb.firebaseio.com",
        projectId: "handylanka-6f7b3",
        storageBucket: "handylanka-6f7b3.firebasestorage.app",
        messagingSenderId: "932726552349",
        appId: "1:932726552349:web:e7a51b17fd381b168d93f4"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allEmployees = [];

    database.ref('employees').on('value', (snapshot) => {
        const data = snapshot.val();
        allEmployees = [];
        if (data) {
            for (let id in data) {
                let emp = data[id];
                emp.id = id;
                allEmployees.push(emp);
            }
        }
        displayEmployees(allEmployees);
    });

    function displayEmployees(dataList) {
        const grid = document.getElementById('employeeGrid');
        grid.innerHTML = "";

        if (dataList.length === 0) {
            grid.innerHTML = '<div class="no-data">No matching professionals found.</div>';
            return;
        }

        dataList.forEach(emp => {
            const serviceName = emp.service ? emp.service.replace(/_/g, ' ') : 'General';
            const fullServiceType = emp.sub_service ? emp.sub_service.replace(/_/g, ' ') : 'General Professional';
            const rate = emp.hourly_rate ? `Rs. ${emp.hourly_rate}/hr` : 'N/A';
            const address = emp.address ? emp.address : 'Not Provided';
            
            let optionTags = '';
            if (emp.customer_options && Array.isArray(emp.customer_options)) {
                optionTags = emp.customer_options.map(opt => `<span class="opt-tag">✓ ${opt}</span>`).join('');
            }

            grid.innerHTML += `
                <div class="emp-card">
                    <div>
                        <span class="category-tag">${serviceName}</span>
                        <span class="hourly-badge">${rate}</span>
                    </div>
                    <h3>${emp.name}</h3>
                    <div class="full-service-type">🛠️ ${fullServiceType}</div>
                    
                    <div class="info-row"><span>📍</span><p>${address}</p></div>
                    <div class="info-row"><span>📧</span><p>${emp.email}</p></div>
                    <div class="info-row"><span>📞</span><p>${emp.phone}</p></div>
                    
                    <div class="cust-options-container">
                        ${optionTags}
                    </div>

                    <div class="experience-box">
                        <strong>Work Experience:</strong><br>
                        ${emp.exp}
                    </div>

                    <div class="skill-container">
                        <div class="skill-header">
                            <span>Proficiency</span>
                            <span>${emp.skill}%</span>
                        </div>
                        <div class="skill-level-bg">
                            <div class="skill-level-fill" style="width: ${emp.skill}%"></div>
                        </div>
                    </div>

                    <button class="delete-btn" onclick="deleteEmployee('${emp.id}')">🗑️ Delete Data</button>
                </div>
            `;
        });
    }

    // Function to delete employee data from database
    function deleteEmployee(id) {
        if (confirm("Are you sure you want to delete this employee's data from the database? This action cannot be undone.")) {
            database.ref('employees/' + id).remove()
                .then(() => {
                    alert("Employee data deleted successfully!");
                })
                .catch((error) => {
                    console.error("Error deleting data: ", error);
                    alert("Error deleting data. Please try again.");
                });
        }
    }

    function searchEmployees() {
    const term = document.getElementById('searchInput').value.toLowerCase().trim();
    
    // දත්ත ලැයිස්තුව පරීක්ෂා කිරීම
    const filtered = allEmployees.filter(e => {
        const name = (e.name || "").toLowerCase();
        const service = (e.service || "").toLowerCase();
        const address = (e.address || "").toLowerCase();
        const subService = (e.sub_service || "").toLowerCase();

        return name.includes(term) || 
               service.includes(term) || 
               address.includes(term) || 
               subService.includes(term);
    });
    
    displayEmployees(filtered);
}
    function filterData(category, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (category === 'all') {
            displayEmployees(allEmployees);
        } else {
            const filtered = allEmployees.filter(e => e.service === category);
            displayEmployees(filtered);
        }
    }
</script>

</body>
</html>
