<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Database - HANDY LANKA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d97706;
            --accent: #f5b400;
            --bg-gradient: linear-gradient(-45deg, #fdfc47, #fef3c7, #a7f3d0, #fef3c7);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #111827;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: var(--text-main);
            overflow-x: hidden;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .n_logo { height: 70px; width: auto; cursor: pointer; transition: 0.3s; }
        .n_logo:hover { transform: scale(1.05); }

        .add-btn {
            background: var(--primary);
            color: white;
            padding: 12px 28px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.3);
        }

        .add-btn:hover { background: #b45309; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(217, 119, 6, 0.4); }

        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 25px;
        }

        h2 { text-align: center; font-size: 2.8rem; margin-bottom: 25px; font-weight: 800; color: #1f2937; }
        h2 span { color: var(--primary); }

        .search-container {
            max-width: 650px;
            margin: 0 auto 35px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 20px;
            border: 2px solid transparent;
            outline: none;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            font-size: 1rem;
            transition: 0.3s;
        }

        .search-container input:focus { border-color: var(--primary); background: #fff; }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 45px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 24px;
            border: none;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            color: #4b5563;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.2);
        }

        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 30px;
        }

        .emp-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            animation: cardAppear 0.5s ease backwards;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .emp-card:hover { transform: translateY(-12px); background: #fff; border-color: var(--primary); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }

        .category-tag {
            background: #fef3c7;
            color: #92400e;
            padding: 5px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .hourly-badge {
            background: #dcfce7;
            color: #166534;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .emp-card h3 { font-size: 1.4rem; color: #111827; margin-bottom: 5px; }
        
        .full-service-type {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 15px;
            padding: 6px 12px;
            background: rgba(217, 119, 6, 0.08);
            border-radius: 10px;
            display: inline-block;
        }

        .info-group { margin-bottom: 15px; }
        .info-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.9rem; color: #4b5563; }
        .info-row span { font-size: 1.1rem; }

        .experience-box {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary);
            color: #374151;
        }

        .skill-section { margin-top: auto; }
        .skill-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 0.85rem; }

        .skill-bar-bg { height: 10px; background: #e5e7eb; border-radius: 10px; overflow: hidden; }
        .skill-bar-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--accent), var(--primary)); 
            border-radius: 10px;
            transition: width 1.5s ease-out;
        }

        .delete-btn {
            margin-top: 20px;
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .delete-btn:hover { background: #ef4444; color: white; }

        .no-data { 
            grid-column: 1/-1; 
            text-align: center; 
            padding: 60px; 
            background: var(--card-bg); 
            border-radius: 30px;
            font-weight: 600;
        }

        footer { text-align: center; padding: 50px; color: #6b7280; font-size: 0.9rem; }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .n_logo { height: 50px; }
            h2 { font-size: 2rem; }
            .employee-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <img src="n logo.png" class="n_logo" alt="Logo" onclick="window.location.href='owner.html'">
    <button class="add-btn" onclick="window.location.href='employee1.html'">+ Add Professional</button>
</header>

<div class="container">
    <h2>Handy Lanka <span>Database</span></h2>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search by name, specialty, or city..." onkeyup="searchEmployees()">
    </div>

    <div class="filter-tabs">
        <button class="tab-btn active" onclick="filterData('all', this)">All Experts</button>
        <button class="tab-btn" onclick="filterData('house_cleaning_painting', this)">Cleaning & Painting</button>
        <button class="tab-btn" onclick="filterData('electrical', this)">Electrical</button>
        <button class="tab-btn" onclick="filterData('plumbing', this)">Plumbing</button>
        <button class="tab-btn" onclick="filterData('gardening', this)">Gardening</button>
        <button class="tab-btn" onclick="filterData('handyman', this)">Handyman</button>
        <button class="tab-btn" onclick="filterData('moving', this)">Moving Help</button>
    </div>

    <div class="employee-grid" id="employeeGrid">
        <div class="no-data">Fetching professionals from the database...</div>
    </div>
</div>

<footer>&copy; 2026 HANDY LANKA - Secure Management Portal</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBmVI2C4G9S4THlS2Tu3JpVo1LpDAMBpfM",
        authDomain: "handylanka-6f7b3.firebaseapp.com",
        databaseURL: "https://handylanka-6f7b3-default-rtdb.firebaseio.com",
        projectId: "handylanka-6f7b3",
        storageBucket: "handylanka-6f7b3.firebasestorage.app",
        messagingSenderId: "932726552349",
        appId: "1:932726552349:web:e7a51b17fd381b168d93f4"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allEmployees = [];

    // Real-time Database Listener
    database.ref('employees').on('value', (snapshot) => {
        const data = snapshot.val();
        allEmployees = [];
        if (data) {
            for (let id in data) {
                allEmployees.push({ ...data[id], id: id });
            }
        }
        displayEmployees(allEmployees);
    });

    function displayEmployees(dataList) {
        const grid = document.getElementById('employeeGrid');
        grid.innerHTML = "";

        if (dataList.length === 0) {
            grid.innerHTML = `
                <div class="no-data">
                    <p style="font-size: 1.5rem; margin-bottom: 10px;">🔍 No Professionals Found</p>
                    <p style="font-weight: 400; color: #6b7280;">Try adjusting your search or filters.</p>
                </div>`;
            return;
        }

        dataList.forEach((emp, index) => {
            const serviceLabel = (emp.service || 'Expert').replace(/_/g, ' ');
            const subServiceLabel = (emp.sub_service || 'Professional').replace(/_/g, ' ');
            
            grid.innerHTML += `
                <div class="emp-card" style="animation-delay: ${index * 0.05}s">
                    <div class="card-header">
                        <span class="category-tag">${serviceLabel}</span>
                        <span class="hourly-badge">Rs. ${emp.hourly_rate || '0'}/hr</span>
                    </div>
                    
                    <h3>${emp.name}</h3>
                    <div class="full-service-type">🛠️ ${subServiceLabel}</div>
                    
                    <div class="info-group">
                        <div class="info-row"><span>📍</span> ${emp.address || 'Location Hidden'}</div>
                        <div class="info-row"><span>📞</span> ${emp.phone || 'No Phone'}</div>
                        <div class="info-row"><span>📧</span> ${emp.email || 'No Email'}</div>
                    </div>

                    <div class="experience-box">
                        <strong>Bio:</strong> ${emp.exp || 'Experienced professional ready to help.'}
                    </div>

                    <div class="skill-section">
                        <div class="skill-info">
                            <span>Proficiency Level</span>
                            <span>${emp.skill || '0'}%</span>
                        </div>
                        <div class="skill-bar-bg">
                            <div class="skill-bar-fill" style="width: ${emp.skill || 0}%"></div>
                        </div>
                    </div>

                    <button class="delete-btn" onclick="deleteEmployee('${emp.id}')">
                        🗑️ Delete Record
                    </button>
                </div>
            `;
        });
    }

    function deleteEmployee(id) {
        if (confirm("🚨 PERMANENT ACTION: Delete this professional from Handy Lanka database?")) {
            database.ref('employees/' + id).remove()
                .then(() => alert("Success: Record removed."))
                .catch((err) => alert("Error: Could not delete."));
        }
    }

    function searchEmployees() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = allEmployees.filter(e => 
            (e.name || "").toLowerCase().includes(term) ||
            (e.service || "").toLowerCase().includes(term) ||
            (e.address || "").toLowerCase().includes(term) ||
            (e.sub_service || "").toLowerCase().includes(term)
        );
        displayEmployees(filtered);
    }

    function filterData(category, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (category === 'all') {
            displayEmployees(allEmployees);
        } else {
            const filtered = allEmployees.filter(e => e.service === category);
            displayEmployees(filtered);
        }
    }
</script>

</body>
</html>
