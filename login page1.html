<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HANDY LANKA</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-image: url('picture.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .n_logo {
            width: 180px;
            height: auto;
            transition: 0.3s;
        }

        .navigation {
            display: flex;
            gap: 30px;
        }

        .word {
            font-size: 1.1em;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            position: relative;
        }

        .word::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 3px;
            background-color: #d97706;
            transition: 0.3s;
        }

        .word:hover::after {
            width: 100%;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 20px;
        }

        .wrapper {
            width: 450px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            transition: 0.4s;
        }

        .form-box h2 {
            font-size: 2.5em;
            color: #000;
            text-align: center;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .form-box p.subtitle {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .ib {
            position: relative;
            width: 100%;
            height: 55px;
            border-bottom: 2px solid #000;
            margin: 35px 0;
        }

        .ib label {
            position: absolute;
            top: 50%;
            left: 5px;
            transform: translateY(-50%);
            font-size: 1em;
            color: #000;
            font-weight: 600;
            pointer-events: none;
            transition: .5s;
        }

        .ib input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1em;
            color: #000;
            font-weight: 600;
            padding: 0 35px 0 5px;
        }

        .ib input:focus~label,
        .ib input:valid~label {
            top: -5px;
            font-size: 0.85em;
            color: #d97706;
        }

        .icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #000;
        }

        .rf {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #000;
            font-weight: 600;
            margin: -15px 0 25px;
        }

        .rf input {
            accent-color: #d97706;
            margin-right: 5px;
        }

        .uu {
            color: #000;
            text-decoration: none;
        }

        .uu:hover {
            text-decoration: underline;
            color: #d97706;
        }

        .b2-btn {
            width: 100%;
            height: 50px;
            background: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1em;
            color: #fff;
            font-weight: 700;
            transition: .3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .b2-btn:hover {
            background: #d97706;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(217, 119, 6, 0.3);
        }

        .login-register {
            font-size: .95em;
            color: #000;
            text-align: center;
            margin-top: 25px;
            font-weight: 500;
        }

        .a11 {
            color: #d97706;
            font-weight: 700;
            cursor: pointer;
            margin-left: 5px;
            text-decoration: none;
        }

        .a11:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            header { padding: 15px 5%; }
            .navigation { display: none; }
            .wrapper { width: 90%; padding: 30px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/4915b25f03.js" crossorigin="anonymous"></script>
</head>
<body>

    <header>
        <div class="logo">
            <img src="n logo.png" class="n_logo">
        </div>
        
       <nav class="navigation">
        <a class="word" href="home.html#home">Home</a>
        <a class="word" href="home.html#about">About</a>
        <a class="word" href="home.html#services">Services</a>
        <a class="word" href="home.html#contact">Contact</a>
    </nav>
    </header>

    <div class="main-content">
        <div class="wrapper">
            <div class="form-box">
                <h2>Login</h2>
                <p class="subtitle">Please enter your details to continue</p>
                
                <form onsubmit="event.preventDefault(); validateLogin();">
                    <div class="ib">
                        <span class="icon"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" required>
                        <label>Email Address</label>
                    </div>

                    <div class="ib">
                        <span class="icon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" required>
                        <label>Password</label>
                    </div>

                    <div class="rf">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#" class="uu">Forgot Password?</a>
                    </div>

                    <button type="submit" class="b2-btn">Login Now</button>

                    <div class="login-register">
                        <p>New to Handy Lanka? 
                            <span class="a11" onclick="location.href='regis.html'">Register here</span>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDDXkRpZm2JA_Dz4U8iemCoFNtu9_3ebqI",
            authDomain: "handylanka.firebaseapp.com",
            projectId: "handylanka",
            storageBucket: "handylanka.firebasestorage.app",
            messagingSenderId: "140530899242",
            appId: "1:140530899242:web:a7932ec11176535ed82653",
            measurementId: "G-9FHZXXPBZD"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        async function validateLogin() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const btn = document.querySelector(".b2-btn");

            // --- Owner Specific Check ---
            if (email === "isuru123@gmail.com" && password === "123321123") {
                window.location.href = "owner.html";
                return;
            }

            try {
                btn.innerHTML = "Authenticating...";
                btn.disabled = true;

                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                const doc = await db.collection("users").doc(user.uid).get();

                if (doc.exists) {
                    const userData = doc.data();
                    if (userData.role === 'customer') {
                        window.location.href = "page1.html";
                    } else {
                        localStorage.setItem("userEmail", email);
                        window.location.href = "profile.html";
                    }
                } else {
                    alert("User data not found.");
                }

            } catch (error) {
                alert("Login Failed: " + error.message);
            } finally {
                btn.innerHTML = "Login Now";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
